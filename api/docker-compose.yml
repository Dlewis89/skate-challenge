version: '3'

services:
    php:
        build:
            context: .
            dockerfile: 'php.Dockerfile'
        volumes:
            - ./:/var/www/html

    nginx:
        image: nginx
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - .docker/nginx/nginx_template_local.conf:/etc/nginx/conf.d/default.conf
        ports:
            - "80:80"

    db:
        image: mysql:8
        environment:
            MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
            MYSQL_ROOT_HOST: "%"
            MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
            MYSQL_DATABASE: "${DB_DATABASE}"
            MYSQL_USER: "${DB_USERNAME}"
            MYSQL_PASSWORD: "${DB_PASSWORD}"
        volumes:
            - mysqldata:/var/lib/mysql

    node:
        image: node:20
        user: node
        working_dir: /assets
        volumes:
            - ./:/assets
        command: npm run dev

    redis:
        image: redis
        volumes:
            - redisdata:/data

volumes:
    mysqldata:
    redisdata:
